# Pocket Pixel local emulator profile.
#
# Arduboy renders a 128x64 1-bit framebuffer. Smoothing, shaders, overlays, or
# fractional scaling can make white and black pixels blend into gray fringes.

video_smooth = "false"
video_shader_enable = "false"
video_filter = ""
video_scale_integer = "true"
video_scale_integer_overscale = "false"
video_aspect_ratio_auto = "true"

input_overlay_enable = "false"
